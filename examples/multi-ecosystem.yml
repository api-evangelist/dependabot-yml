version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - ci
      - dependencies

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directories:
      - "/services/api"
      - "/services/worker"
    schedule:
      interval: daily
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 5
      semver-major-days: 14
